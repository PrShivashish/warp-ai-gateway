# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — reverse proxy for Warp on Hugging Face Spaces
#
# Traffic routing (all on port 7860 externally):
#
#   /api/v1/*            → primary-backend auth & management  (port 3000)
#   /v1/chat/*           → api-gateway OpenAI-compat endpoint  (port 4000)
#   /api/chat/*          → api-gateway legacy endpoint          (port 4000)
#   /health              → primary-backend health check         (port 3000)
#   /                    → primary-backend root                 (port 3000)
# ─────────────────────────────────────────────────────────────────────────────

worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Upstream definitions
    upstream primary_backend {
        server 127.0.0.1:3000;
    }

    upstream api_gateway {
        server 127.0.0.1:4000;
    }

    server {
        listen 7860;
        server_name _;

        # ── Health check ─────────────────────────────────────────────────
        location = /health {
            proxy_pass http://primary_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── API Gateway — OpenAI-compat route ────────────────────────────
        location /v1/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE / streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ── API Gateway — legacy /api/v1/chat route ──────────────────────
        location /api/v1/chat/ {
            proxy_pass http://api_gateway/api/v1/chat/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE / streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ── Primary Backend — everything else ───────────────────────────
        location / {
            proxy_pass http://primary_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }
}
